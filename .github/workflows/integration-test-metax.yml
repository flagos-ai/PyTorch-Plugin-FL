name: Integration Tests (MetaX)

on:
  workflow_call:
    inputs:
      timeout-minutes:
        description: "Timeout for the entire job in minutes"
        required: false
        type: number
        default: 60
  workflow_dispatch:
    inputs:
      timeout-minutes:
        description: "Timeout for the entire job in minutes"
        required: false
        type: number
        default: 60

jobs:
  integration-tests:
    name: Integration Tests (MetaX GPU)
    runs-on: [self-hosted, maca, gpu-8]
    timeout-minutes: ${{ inputs.timeout-minutes }}
    container:
      image: localhost:5000/flagos/torch-plugin-fl:ci
      volumes:
        - /nfs:/nfs
      options: >-
        --privileged
        --ipc=host
        --shm-size 512g
        --ulimit memlock=-1
        --cap-add=SYS_PTRACE

    steps:
      - uses: actions/checkout@v4

      - name: Check device availability
        run: |
          export LD_LIBRARY_PATH=/opt/maca-3.3.0/tools/cu-bridge/lib:$LD_LIBRARY_PATH
          python -c "import torch_fl; assert torch_fl.flagos.is_available(), 'flagos device not available'"

      - name: Install dependencies
        run: |
          export LD_LIBRARY_PATH=/opt/maca-3.3.0/tools/cu-bridge/lib:$LD_LIBRARY_PATH
          pip install --upgrade pip
          ACCELERATOR=metax pip install -e . --no-build-isolation
          pip install pytest

      - name: Run ops tests
        run: |
          export LD_LIBRARY_PATH=/opt/maca-3.3.0/tools/cu-bridge/lib:$LD_LIBRARY_PATH
          pytest tests/integration/ops/ -v -s --tb=short

      - name: Run general tests
        run: |
          export LD_LIBRARY_PATH=/opt/maca-3.3.0/tools/cu-bridge/lib:$LD_LIBRARY_PATH
          pytest tests/integration/test_factory_ops.py -v --device flagos --tb=short

      - name: Run inference tests
        run: |
          export LD_LIBRARY_PATH=/opt/maca-3.3.0/tools/cu-bridge/lib:$LD_LIBRARY_PATH
          pytest tests/integration/test_qwen3_infer.py -v -s --device flagos --tb=short

      - name: Run training tests
        run: |
          export LD_LIBRARY_PATH=/opt/maca-3.3.0/tools/cu-bridge/lib:$LD_LIBRARY_PATH
          pytest tests/integration/test_qwen3_train.py -v -s --device flagos --tb=short
