# flagos op backend config for Ascend
# Format: op_name = backend
# backend: flaggems | ascend
# Default (unlisted ops): flaggems (will CPU-fallback if FlagGems is disabled)
#
# Usage: FLAGOS_BACKEND_CONFIG=torch_fl/backends_ascend.conf
#
# Only ops with a registered Ascend kernel (csrc/aten/backends/ascend/) can use "ascend".
# Others will use the default (flaggems) or CPU fallback.

mm = ascend
mm.out = ascend
bmm = ascend
bmm.out = ascend
cat = ascend
embedding = ascend
add.Tensor = ascend
mul.Tensor = ascend
silu = ascend
rsqrt = ascend
mean.dim = ascend
cos = ascend
sin = ascend
neg = ascend
pow.Tensor_Scalar = ascend
all = ascend
_softmax = ascend
bitwise_and.Tensor = ascend
le.Tensor = ascend
where.self = ascend
index.Tensor = ascend
new_ones = ascend
scalar_tensor = ascend
ones_like = ascend
zeros = ascend
silu_backward = ascend
sum.dim_IntList = ascend
slice_backward = ascend
constant_pad_nd = ascend
embedding_dense_backward = ascend
nll_loss_forward = ascend
nll_loss_backward = ascend
abs = ascend
acos = ascend
