# Ascend + FlagGems hybrid config
# With prefer_block_pointer=False (via _patch_flaggems_codegen_config), FlagGems
# Triton kernels avoid the triton-ascend block pointer compiler bug.
#
# NOTE: flagos_python backend requires FLAGGEMS_KERNEL=1 at build time.
# When FLAGGEMS_KERNEL=0, all ops must use 'ascend' backend.
#
# Strategy: start with all ops on ascend, selectively enable flagos_python
# for ops whose Triton kernels compile successfully on triton-ascend.

# --- Ops routed to FlagGems Triton (verified on triton-ascend) ---
abs = flagos_python
neg = flagos_python
cos = flagos_python
sin = flagos_python

# --- All other ops on ascend C++ backend ---
acos = ascend
add.Tensor = ascend
all = ascend
bitwise_and.Tensor = ascend
bmm = ascend
bmm.out = ascend
cat = ascend
constant_pad_nd = ascend
embedding = ascend
embedding_dense_backward = ascend
index.Tensor = ascend
le.Tensor = ascend
mean.dim = ascend
mm = ascend
mm.out = ascend
mul.Tensor = ascend
mul.Scalar = ascend
new_ones = ascend
nll_loss_forward = ascend
nll_loss_backward = ascend
ones_like = ascend
pow.Tensor_Scalar = ascend
rsqrt = ascend
scalar_tensor = ascend
silu = ascend
silu_backward = ascend
_softmax = ascend
sum.dim_IntList = ascend
where.self = ascend
zeros = ascend
slice_backward = ascend
