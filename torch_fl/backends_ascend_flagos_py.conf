# Ascend + FlagGems hybrid config
# With prefer_block_pointer=False (via _patch_flaggems_codegen_config), FlagGems
# Triton kernels avoid the triton-ascend block pointer compiler bug.
#
# NOTE: flagos_python backend requires FLAGGEMS_KERNEL=1 at build time.
# When FLAGGEMS_KERNEL=0, all ops must use 'ascend' backend.

# --- FlagGems Triton kernels (via python_op_caller) ---
abs = flagos_python
acos = flagos_python
add.Tensor = flagos_python
all = flagos_python
bitwise_and.Tensor = flagos_python
bmm = ascend  # FlagGems uses SPLIT_K kwarg not supported by triton-ascend
bmm.out = ascend  # same as bmm
cat = ascend  # triton-ascend compiler crashes (ConvertTritonIRToLinalgIR) on 4D shapes
constant_pad_nd = flagos_python
cos = flagos_python
le.Tensor = flagos_python
mean.dim = flagos_python
mm = ascend  # FlagGems uses SPLIT_K kwarg not supported by triton-ascend
mm.out = ascend  # same as mm
mul.Tensor = flagos_python
mul.Scalar = flagos_python
neg = flagos_python
nll_loss_forward = flagos_python
nll_loss_backward = flagos_python
pow.Tensor_Scalar = flagos_python
rsqrt = flagos_python
silu = flagos_python
silu_backward = flagos_python
sin = flagos_python
_softmax = flagos_python
sum.dim_IntList = flagos_python
where.self = flagos_python
index.Tensor = flagos_python

# --- Ops that must use ascend C++ backend ---
# Factory/allocation ops: FlagGems does not register these; they need
# device-level memory allocation which only the C++ backend provides.
embedding = ascend
embedding_dense_backward = ascend
new_ones = ascend
ones_like = ascend
scalar_tensor = ascend
zeros = ascend
slice_backward = ascend
